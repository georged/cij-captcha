<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIJ Captcha Configuration</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #f4f6f8;
      color: #1f2937;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 18px;
      color: #374151;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .settings-fields {
      display: none;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .settings-fields.visible {
      display: grid;
    }

    .loading-panel {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      color: #374151;
      font-size: 14px;
    }

    .loading-panel.visible {
      display: flex;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      border-top-color: #2563eb;
      animation: spin 0.8s linear infinite;
      flex: 0 0 16px;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: #111827;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #9ca3af;
      border-radius: 4px;
      padding: 8px 10px;
      background: #fff;
      color: #111827;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .secret-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .secret-row input {
      flex: 1;
      min-width: 0;
    }

    .secret-toggle {
      white-space: nowrap;
      border: 1px solid #9ca3af;
      background: #fff;
      color: #111827;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #1d4ed8;
      background: #2563eb;
      color: #fff;
      border-radius: 4px;
      padding: 8px 14px;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .status {
      min-height: 20px;
      color: #1f2937;
      font-size: 14px;
    }

    .hint {
      color: #6b7280;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>CIJ Captcha Configuration</h1>
    <p>Configure provider, min score, and secret key for the CIJ captcha plugin step.</p>

    <form id="config-form" class="grid" autocomplete="off">
      <div id="loading-panel" class="loading-panel visible" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>Loading settings from Dataverse...</span>
      </div>

      <div id="settings-fields" class="settings-fields">
        <label for="provider">
          Provider
          <select id="provider" name="provider">
            <option value="recaptcha">Google reCAPTCHA v3</option>
            <option value="turnstile">Cloudflare Turnstile</option>
          </select>
        </label>

        <label id="minscore-container" for="minscore">
          Minimum score
          <input id="minscore" name="minscore" type="number" min="0" max="1" step="0.1" value="0.5" />
        </label>

        <label id="recaptcha-mode-container" for="recaptcha-mode">
          reCAPTCHA mode
          <select id="recaptcha-mode" name="recaptcha-mode">
            <option value="standard">Standard</option>
            <option value="enterprise">Enterprise</option>
          </select>
        </label>

        <label id="projectid-container" for="projectid">
          Enterprise project id
          <input id="projectid" name="projectid" type="text" placeholder="my-gcp-project-id" />
        </label>

        <label id="sitekey-container" for="sitekey">
          Enterprise site key
          <input id="sitekey" name="sitekey" type="text" placeholder="6Lxxxxxxxxxxxxxxxx" />
        </label>

        <label id="expectedaction-container" for="expectedaction">
          Expected action
          <input id="expectedaction" name="expectedaction" type="text" value="cij_form_submit" />
        </label>

        <label for="failuremessage">
          Plugin validation failure message
          <input id="failuremessage" name="failuremessage" type="text" placeholder="Captcha test failed." />
        </label>

        <label for="secret">
          Secret key
          <div class="secret-row">
            <input id="secret" name="secret" type="password" placeholder="Enter provider secret key" />
            <button id="toggle-secret" class="secret-toggle" type="button" aria-pressed="false">Show</button>
          </div>
        </label>
      </div>

      <div class="actions">
        <button id="save-btn" type="submit">Save Configuration</button>
        <div id="status" class="status">Loading configuration...</div>
      </div>

      <label for="snippet-sitekey">
        Snippet site key
        <input id="snippet-sitekey" type="text" placeholder="YOUR_SITE_KEY" />
      </label>

      <label for="snippet-endpoint">
        Snippet verify endpoint
        <input id="snippet-endpoint" type="text" placeholder="https://YOUR_FUNCTION_HOST/api/captcha/verify" />
      </label>

      <label for="snippet-timeout">
        Snippet timeout (ms)
        <input id="snippet-timeout" type="number" min="1000" step="500" value="8000" />
      </label>

      <label for="snippet-presubmit">
        Snippet pre-submit enabled
        <select id="snippet-presubmit">
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </label>

      <label for="snippet-debug">
        Snippet debug logging
        <select id="snippet-debug">
          <option value="false">false</option>
          <option value="true">true</option>
        </select>
      </label>

      <label for="snippet-failure">
        Snippet validation failure message override
        <input id="snippet-failure" type="text" placeholder="Leave blank to use the server-returned message" />
      </label>

      <label for="snippet-output">
        Ready-to-paste init snippet
        <textarea id="snippet-output" rows="14" readonly></textarea>
      </label>
    </form>

    <div class="hint">Don't forget to add form hosting domain (e.g. `assets-usa.mkt.dynamics.com`) to the list of approved domains for your captcha keys.</div>
  </main>

  <script src="ClientGlobalContext.js.aspx" type="text/javascript"></script>
  <script>
    (function () {
      'use strict';

      var PLUGIN_TYPE_NAME = 'Georged.Cij.Captcha.CaptchaValidationPlugin';
      var MESSAGE_NAME = 'msdynmkt_validateformsubmission';

      var state = {
        stepId: '',
        secureConfigId: '',
        isSaving: false,
        isSecretVisible: false,
        isLoaded: false
      };

      function debug() {
        var args = Array.prototype.slice.call(arguments);
        args.unshift('[CIJ Config WebResource]');
        console.debug.apply(console, args);
      }

      function normalizeGuid(value) {
        return String(value || '').replace(/[{}]/g, '').trim().toLowerCase();
      }

      function escapeODataString(value) {
        return String(value || '').replace(/'/g, "''");
      }

      function clamp(value) {
        return Math.max(0, Math.min(1.0, value));
      }

      function parseUnsecureConfig(config) {
        var result = {
          provider: 'recaptcha',
          minscore: 0.5,
          recaptchamode: 'standard',
          projectid: '',
          sitekey: '',
          expectedaction: 'cij_form_submit',
          failuremessage: ''
        };
        if (!config) return result;

        function decodeConfigValue(value) {
          try {
            return decodeURIComponent(value);
          } catch (error) {
            return value;
          }
        }

        var parts = String(config).split(';');
        for (var i = 0; i < parts.length; i++) {
          var pair = parts[i].split('=');
          if (pair.length < 2) continue;

          var key = pair[0].trim().toLowerCase();
          var value = pair.slice(1).join('=').trim().toLowerCase();

          if (key === 'provider' && (value === 'recaptcha' || value === 'turnstile')) {
            result.provider = value;
          }

          if (key === 'minscore') {
            var parsed = Number(value);
            if (!Number.isNaN(parsed)) {
              result.minscore = clamp(parsed);
            }
          }

          if (key === 'recaptchamode' && (value === 'standard' || value === 'enterprise')) {
            result.recaptchamode = value;
          }

          if (key === 'projectid') {
            result.projectid = pair.slice(1).join('=').trim();
          }

          if (key === 'sitekey') {
            result.sitekey = pair.slice(1).join('=').trim();
          }

          if (key === 'expectedaction') {
            result.expectedaction = decodeConfigValue(pair.slice(1).join('=').trim());
          }

          if (key === 'failuremessage') {
            result.failuremessage = decodeConfigValue(pair.slice(1).join('=').trim());
          }
        }

        return result;
      }

      function getUnsecureConfig() {
        var provider = document.getElementById('provider').value;
        if (provider === 'turnstile') {
          var turnstileParts = ['provider=turnstile'];
          var turnstileFailureMessage = document.getElementById('failuremessage').value.trim();
          if (turnstileFailureMessage) {
            turnstileParts.push('failuremessage=' + encodeURIComponent(turnstileFailureMessage));
          }
          return turnstileParts.join(';');
        }

        var recaptchaMode = document.getElementById('recaptcha-mode').value;
        var projectId = document.getElementById('projectid').value.trim();
        var siteKey = document.getElementById('sitekey').value.trim();
        var expectedAction = document.getElementById('expectedaction').value.trim();
        var failureMessage = document.getElementById('failuremessage').value.trim();
        var minScoreRaw = Number(document.getElementById('minscore').value);
        var minScore = Number.isNaN(minScoreRaw) ? 0.5 : clamp(minScoreRaw);

        var parts = [
          'provider=recaptcha',
          'recaptchamode=' + recaptchaMode,
          'minscore=' + minScore
        ];

        if (expectedAction) parts.push('expectedaction=' + expectedAction);
        if (failureMessage) parts.push('failuremessage=' + encodeURIComponent(failureMessage));
        if (recaptchaMode === 'enterprise') {
          if (projectId) parts.push('projectid=' + projectId);
          if (siteKey) parts.push('sitekey=' + siteKey);
        }

        return parts.join(';');
      }

      function updateSnippet() {
        var provider = document.getElementById('provider').value;
        var recaptchaMode = document.getElementById('recaptcha-mode').value;
        var expectedAction = document.getElementById('expectedaction').value.trim() || 'cij_form_submit';
        var siteKey = document.getElementById('snippet-sitekey').value.trim() || 'YOUR_SITE_KEY';
        var verifyEndpoint = document.getElementById('snippet-endpoint').value.trim() || 'https://YOUR_FUNCTION_HOST/api/captcha/verify';
        var timeoutMs = Number(document.getElementById('snippet-timeout').value);
        var safeTimeout = Number.isNaN(timeoutMs) || timeoutMs <= 0 ? 8000 : timeoutMs;
        var preSubmitEnabled = document.getElementById('snippet-presubmit').value === 'true';
        var debugEnabled = document.getElementById('snippet-debug').value === 'true';
        var failureMessage = document.getElementById('snippet-failure').value.trim();

        var lines = [];
        lines.push('window.CijCaptcha.init({');
        lines.push("  provider: '" + provider + "',");
        lines.push("  siteKey: '" + siteKey + "',");

        if (provider === 'recaptcha') {
          lines.push("  action: '" + expectedAction + "',");
          lines.push('  recaptcha: {');
          lines.push("    mode: '" + recaptchaMode + "'");
          lines.push('  },');
        }

        lines.push('  enableDebugLogs: ' + (debugEnabled ? 'true' : 'false') + ',');
        lines.push('  preSubmit: {');
        lines.push('    enabled: ' + (preSubmitEnabled ? 'true' : 'false') + ',');
        lines.push("    verifyEndpoint: '" + verifyEndpoint + "',");
        lines.push('    timeoutMs: ' + safeTimeout + ',');
        if (failureMessage) {
          lines.push("    failureMessage: '" + String(failureMessage).replace(/'/g, "\\'") + "'");
        }
        lines.push('  }');
        lines.push('});');

        document.getElementById('snippet-output').value = lines.join('\n');
      }

      function render() {
        var provider = document.getElementById('provider').value;
        var recaptchaMode = document.getElementById('recaptcha-mode').value;
        var minScoreContainer = document.getElementById('minscore-container');
        var recaptchaModeContainer = document.getElementById('recaptcha-mode-container');
        var projectIdContainer = document.getElementById('projectid-container');
        var siteKeyContainer = document.getElementById('sitekey-container');
        var expectedActionContainer = document.getElementById('expectedaction-container');

        minScoreContainer.style.display = provider === 'recaptcha' ? 'flex' : 'none';
        recaptchaModeContainer.style.display = provider === 'recaptcha' ? 'flex' : 'none';
        expectedActionContainer.style.display = provider === 'recaptcha' ? 'flex' : 'none';
        projectIdContainer.style.display = provider === 'recaptcha' && recaptchaMode === 'enterprise' ? 'flex' : 'none';
        siteKeyContainer.style.display = provider === 'recaptcha' && recaptchaMode === 'enterprise' ? 'flex' : 'none';
        updateSnippet();
      }

      function renderSecretVisibility() {
        var secretInput = document.getElementById('secret');
        var toggleButton = document.getElementById('toggle-secret');

        secretInput.type = state.isSecretVisible ? 'text' : 'password';
        toggleButton.textContent = state.isSecretVisible ? 'Hide' : 'Show';
        toggleButton.setAttribute('aria-pressed', state.isSecretVisible ? 'true' : 'false');
      }

      function onToggleSecret() {
        state.isSecretVisible = !state.isSecretVisible;
        renderSecretVisibility();
      }

      function setStatus(message) {
        document.getElementById('status').textContent = message;
      }

      function setInputsLoaded(isLoaded) {
        state.isLoaded = isLoaded;

        var settingsFields = document.getElementById('settings-fields');
        var loadingPanel = document.getElementById('loading-panel');
        var saveBtn = document.getElementById('save-btn');

        settingsFields.classList.toggle('visible', isLoaded);
        loadingPanel.classList.toggle('visible', !isLoaded);
        saveBtn.disabled = !isLoaded || state.isSaving;
      }

      function getGlobalContext() {
        if (typeof GetGlobalContext === 'function') {
          return GetGlobalContext();
        }

        throw new Error('GetGlobalContext is not available. Ensure ClientGlobalContext.js.aspx is referenced and the page is opened as a Dataverse web resource.');
      }

      function getClientUrl() {
        var context = getGlobalContext();
        var clientUrl = context.getClientUrl && context.getClientUrl();
        if (!clientUrl) {
          throw new Error('Dataverse client URL is unavailable from global context.');
        }

        return clientUrl.replace(/\/$/, '');
      }

      function buildApiUrl(path) {
        return getClientUrl() + '/api/data/v9.2/' + path.replace(/^\/+/, '');
      }

      async function webApiRequest(method, path, body, preferRepresentation) {
        var headers = {
          'Accept': 'application/json',
          'OData-Version': '4.0',
          'OData-MaxVersion': '4.0'
        };

        if (preferRepresentation) {
          headers.Prefer = 'return=representation';
        }

        if (method === 'PATCH') {
          headers['If-Match'] = '*';
        }

        var request = {
          method: method,
          headers: headers,
          credentials: 'same-origin'
        };

        if (body) {
          headers['Content-Type'] = 'application/json; charset=utf-8';
          request.body = JSON.stringify(body);
        }

        var url = buildApiUrl(path);
        debug('webApiRequest', { method: method, url: url, body: body || null });

        var response = await fetch(url, request);
        var text = await response.text();

        if (!response.ok) {
          var detail = text;
          try {
            var parsedError = JSON.parse(text);
            detail = parsedError.error && parsedError.error.message ? parsedError.error.message : text;
          } catch (error) {
            // Keep raw text as detail when response is not JSON.
          }

          throw new Error('Dataverse Web API request failed (' + response.status + '): ' + detail);
        }

        if (!text) return null;

        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error('Failed to parse Dataverse response as JSON.');
        }
      }

      async function queryAll(entityLogicalName, selectColumns, filter, top) {
        var entitySetNameMap = {
          plugintype: 'plugintypes',
          sdkmessage: 'sdkmessages',
          sdkmessageprocessingstep: 'sdkmessageprocessingsteps',
          sdkmessageprocessingstepsecureconfig: 'sdkmessageprocessingstepsecureconfigs'
        };

        var entitySetName = entitySetNameMap[entityLogicalName];
        if (!entitySetName) {
          throw new Error('Unsupported entity logical name: ' + entityLogicalName);
        }

        var options = '?$select=' + encodeURIComponent(selectColumns.join(','));

        if (filter) {
          options += '&$filter=' + encodeURIComponent(filter);
        }

        if (top) {
          options += '&$top=' + top;
        }

        debug('queryAll', { entityLogicalName: entityLogicalName, options: options });

        var result = await webApiRequest('GET', entitySetName + options);
        var rows = result && result.value ? result.value : [];
        debug('queryAll result', entityLogicalName, rows);
        return rows;
      }

      async function resolvePluginType() {
        var exact = await queryAll(
          'plugintype',
          ['plugintypeid', 'typename'],
          "typename eq '" + escapeODataString(PLUGIN_TYPE_NAME) + "'"
        );

        if (exact.length && exact[0].plugintypeid) {
          return exact[0];
        }

        var fallback = await queryAll(
          'plugintype',
          ['plugintypeid', 'typename'],
          "contains(typename,'" + escapeODataString(PLUGIN_TYPE_NAME) + "') or contains(typename,'Captcha')",
          25
        );

        if (fallback.length === 1 && fallback[0].plugintypeid) {
          return fallback[0];
        }

        throw new Error('Plugin type not found: ' + PLUGIN_TYPE_NAME);
      }

      async function resolveSdkMessage() {
        var exact = await queryAll(
          'sdkmessage',
          ['sdkmessageid', 'name'],
          "name eq '" + escapeODataString(MESSAGE_NAME) + "'"
        );

        if (exact.length && exact[0].sdkmessageid) {
          return exact[0];
        }

        var fallback = await queryAll(
          'sdkmessage',
          ['sdkmessageid', 'name'],
          "contains(name,'validateformsubmission')",
          25
        );

        throw new Error(
          'SDK message not found: ' + MESSAGE_NAME +
          '. Candidates: ' +
          fallback.map(function (x) { return x.name || ''; }).filter(Boolean).join(', ')
        );
      }

      async function resolveStep(pluginTypeId, sdkMessageId) {
        var normalizedSdkMessageId = normalizeGuid(sdkMessageId);
        var selectColumns = [
          'sdkmessageprocessingstepid',
          'configuration',
          'stage',
          'mode',
          'statecode',
          '_sdkmessageid_value',
          '_sdkmessageprocessingstepsecureconfigid_value'
        ];

        var steps = await queryAll(
          'sdkmessageprocessingstep',
          selectColumns,
          '_sdkmessageid_value eq ' + normalizedSdkMessageId + ' and statecode eq 0',
          1
        );

        if (!steps.length) {
          throw new Error('No active sdkmessageprocessingstep found for message.');
        }

        return steps[0];
      }

      async function loadSecureConfig(secureConfigId) {
        if (!secureConfigId) return '';

        debug('loadSecureConfig', secureConfigId);

        var result = await webApiRequest(
          'GET',
          'sdkmessageprocessingstepsecureconfigs(' + normalizeGuid(secureConfigId) + ')?$select=secureconfig'
        );

        debug('loadSecureConfig result', result);
        return result.secureconfig || '';
      }

      async function loadConfiguration() {
        setStatus('Resolving plugin step...');

        var pluginType = await resolvePluginType();
        var sdkMessage = await resolveSdkMessage();
        var step = await resolveStep(pluginType.plugintypeid, sdkMessage.sdkmessageid);

        state.stepId = normalizeGuid(step.sdkmessageprocessingstepid);
        state.secureConfigId = normalizeGuid(step._sdkmessageprocessingstepsecureconfigid_value);

        debug('resolved step', step);
        debug('state after resolve', state);

        var parsed = parseUnsecureConfig(step.configuration || '');
        document.getElementById('provider').value = parsed.provider;
        document.getElementById('minscore').value = String(parsed.minscore);
        document.getElementById('recaptcha-mode').value = parsed.recaptchamode;
        document.getElementById('projectid').value = parsed.projectid;
        document.getElementById('sitekey').value = parsed.sitekey;
        document.getElementById('expectedaction').value = parsed.expectedaction || 'cij_form_submit';
        document.getElementById('failuremessage').value = parsed.failuremessage || '';
        document.getElementById('snippet-sitekey').value = parsed.sitekey;

        var secureValue = '';
        if (state.secureConfigId) {
          secureValue = await loadSecureConfig(state.secureConfigId);
        }
        document.getElementById('secret').value = secureValue;
        debug('loaded secure config', { secureConfigLength: secureValue.length });

        render();
        updateSnippet();
        renderSecretVisibility();
        setInputsLoaded(true);
        setStatus('Loaded current configuration.');
      }

      async function saveConfiguration() {
        if (!state.stepId) {
          throw new Error('Step id is not resolved yet.');
        }

        var secret = document.getElementById('secret').value;
        if (!secret || !secret.trim()) {
          throw new Error('Secret key is required.');
        }

        var provider = document.getElementById('provider').value;
        var recaptchaMode = document.getElementById('recaptcha-mode').value;
        if (provider === 'recaptcha' && recaptchaMode === 'enterprise') {
          var projectId = document.getElementById('projectid').value.trim();
          if (!projectId) {
            throw new Error('Enterprise project id is required when using reCAPTCHA Enterprise mode.');
          }
        }

        var unsecureConfig = getUnsecureConfig();
        debug('saveConfiguration start', {
          stepId: state.stepId,
          secureConfigId: state.secureConfigId,
          unsecureConfig: unsecureConfig,
          secureConfigLength: secret.length
        });

        var secureConfigIdToBind = state.secureConfigId;

        if (secureConfigIdToBind) {
          debug('Updating existing secure config', secureConfigIdToBind);
          await webApiRequest('PATCH', 'sdkmessageprocessingstepsecureconfigs(' + secureConfigIdToBind + ')', {
            secureconfig: secret
          });
        } else {
          debug('Creating secure config record');
          var createResult = await webApiRequest('POST', 'sdkmessageprocessingstepsecureconfigs', {
            secureconfig: secret
          }, true);

          secureConfigIdToBind = normalizeGuid(createResult && createResult.sdkmessageprocessingstepsecureconfigid);
          if (!secureConfigIdToBind) {
            throw new Error('Secure config was created but no id was returned.');
          }
        }

        var stepPayload = {
          configuration: unsecureConfig,
          'sdkmessageprocessingstepsecureconfigid@odata.bind': '/sdkmessageprocessingstepsecureconfigs(' + secureConfigIdToBind + ')'
        };

        debug('Updating sdkmessageprocessingstep', {
          stepId: state.stepId,
          stepPayload: stepPayload
        });

        await webApiRequest('PATCH', 'sdkmessageprocessingsteps(' + state.stepId + ')', stepPayload);

        state.secureConfigId = secureConfigIdToBind;
        debug('Save completed', state);
      }

      async function onSave(event) {
        event.preventDefault();
        if (!state.isLoaded) return;
        if (state.isSaving) return;

        state.isSaving = true;
        var saveBtn = document.getElementById('save-btn');
        saveBtn.disabled = true;

        try {
          setStatus('Saving...');
          await saveConfiguration();
          setStatus('Saved successfully.');
        } catch (error) {
          var message = error && error.message ? error.message : String(error);
          debug('Save failed', error);
          setStatus('Save failed: ' + message);
        } finally {
          state.isSaving = false;
          saveBtn.disabled = false;
        }
      }

      async function init() {
        debug('init start', {
          pluginTypeName: PLUGIN_TYPE_NAME,
          messageName: MESSAGE_NAME
        });

        document.getElementById('provider').addEventListener('change', render);
        document.getElementById('minscore').addEventListener('input', render);
        document.getElementById('recaptcha-mode').addEventListener('change', render);
        document.getElementById('projectid').addEventListener('input', updateSnippet);
        document.getElementById('sitekey').addEventListener('input', function (event) {
          if (!document.getElementById('snippet-sitekey').value) {
            document.getElementById('snippet-sitekey').value = event.target.value;
          }
          updateSnippet();
        });
        document.getElementById('failuremessage').addEventListener('input', render);
        document.getElementById('expectedaction').addEventListener('input', updateSnippet);
        document.getElementById('snippet-sitekey').addEventListener('input', updateSnippet);
        document.getElementById('snippet-endpoint').addEventListener('input', updateSnippet);
        document.getElementById('snippet-timeout').addEventListener('input', updateSnippet);
        document.getElementById('snippet-presubmit').addEventListener('change', updateSnippet);
        document.getElementById('snippet-debug').addEventListener('change', updateSnippet);
        document.getElementById('snippet-failure').addEventListener('input', updateSnippet);
        document.getElementById('toggle-secret').addEventListener('click', onToggleSecret);
        document.getElementById('config-form').addEventListener('submit', onSave);

        setInputsLoaded(false);
        renderSecretVisibility();

        try {
          await loadConfiguration();
        } catch (error) {
          var message = error && error.message ? error.message : String(error);
          debug('Initialization failed', error);
          setStatus('Load failed: ' + message);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
